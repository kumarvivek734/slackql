services:
  db:
    image: postgres
    restart: always
    shm_size: 128mb
    volumes: 
      - ./seed:/docker-entrypoint-initdb.d
    environment:
      POSTGRES_USER: slackql
      POSTGRES_DB: slackql_db
      POSTGRES_PASSWORD: slackql123

  bot:
    build: .
    depends_on: 
      - db
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://slackql:slackql123@db:5432/slackql_db
 